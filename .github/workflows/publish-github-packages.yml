name: Publish to GitHub Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # setup-java 把 server-username/password 写成 ${env.<名称>}，这里必须暴露同名环境变量
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # server-id 必须与 pom 里 distributionManagement 的 <id>github</id> 一致。
      # server-username / server-password 必须是「环境变量名」，不能写 ${{ github.actor }} 或 token 明文；
      # 否则会生成 ${env.Huauauaa} / ${env.ghs_...}，变量不存在 → 空密码 → 401。
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Deploy to GitHub Packages
        run: |
          # GitHub Packages Maven 端点通常要求 owner/repo 小写
          export GITHUB_REPOSITORY="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          mvn -B -Prelease clean deploy
